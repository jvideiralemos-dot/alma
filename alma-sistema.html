<head>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{
  --g:#355C4B;--gd:#243f33;--gl:#e8f0ec;--gll:#f0f7f4;
  --sand:#F5F0E8;--sand2:#ede5d6;--sand3:#f9f6f0;
  --text:#2a2824;--muted:#6b6358;
  --card:rgba(255,255,255,0.92);
  --border:rgba(53,92,75,0.15);
  --red:#dc2626;--amber:#d97706;--blue:#2563eb;--purple:#7c3aed;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--sand);font-family:'DM Sans',sans-serif;color:var(--text);overflow-x:hidden}
button{cursor:pointer;font-family:'DM Sans',sans-serif}
input,select,textarea{font-family:'DM Sans',sans-serif}
.hidden{display:none!important}
.serif{font-family:'Cormorant Garamond',serif}

/* BADGES */
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:500}
.b-ativa,.b-ativo{background:#dcfce7;color:#15803d}
.b-inativa,.b-inativo{background:#fee2e2;color:var(--red)}
.b-pausada,.b-pausado{background:#fef3c7;color:var(--amber)}
.b-cancelamento{background:#ede9fe;color:var(--purple)}
.b-iniciante{background:#dcfce7;color:#15803d}
.b-intermediario{background:#fef3c7;color:var(--amber)}
.b-avancado{background:#fee2e2;color:var(--red)}
.b-gestor{background:#dbeafe;color:var(--blue)}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sb-w,220px);background:var(--gd);display:flex;flex-direction:column;z-index:50;transition:width .2s;overflow:hidden;visibility:visible}
.sb-logo{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo img.ico{width:30px;filter:brightness(0) invert(1);opacity:.85}
.sb-logo img.txt{width:85px;filter:brightness(0) invert(1);opacity:.90;display:block;margin-top:3px}
.sb-logo .tag{font-size:6.5px;text-transform:uppercase;letter-spacing:.5em;color:rgba(255,255,255,.4);margin-top:2px}
.sb-user{padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-user .uname{font-size:.83rem;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user .uinfo{font-size:.70rem;color:rgba(255,255,255,.5);margin-top:1px}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-section{padding:10px 18px 3px;font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.3)}
.sb-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 18px;background:none;border:none;color:rgba(255,255,255,.70);font-size:.84rem;transition:all .15s;text-align:left}
.sb-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-btn.active{background:rgba(255,255,255,.14);color:#fff;font-weight:500}
.sb-btn svg{width:16px;height:16px;flex-shrink:0;opacity:.75}
.sb-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.1)}
.btn-sair{width:100%;padding:8px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.12);border-radius:7px;font-size:.8rem;transition:all .2s}
.btn-sair:hover{background:rgba(255,255,255,.15);color:#fff}

/* MAIN */
.main{margin-left:var(--sb-w,220px);min-height:100vh;padding:24px 26px;flex:1;min-width:0;background:var(--sand)}
.pg-title{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:400;color:var(--g);margin-bottom:4px}
.pg-sub{font-size:.82rem;color:var(--muted);margin-bottom:22px}

/* CARDS */
.card{background:var(--card);border:1px solid rgba(255,255,255,.88);border-radius:14px;box-shadow:0 3px 16px rgba(50,40,20,.06)}
.cp{padding:20px 22px}
.card-title{font-size:.74rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:12px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid rgba(255,255,255,.88);border-radius:13px;padding:16px 18px;box-shadow:0 2px 12px rgba(50,40,20,.05)}
.stat-v{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:400;color:var(--g);line-height:1}
.stat-l{font-size:.74rem;color:var(--muted);margin-top:4px}
.stat-s{font-size:.70rem;color:var(--g);margin-top:2px;font-weight:500}

/* TABLES */
.tbl-wrap{overflow-x:auto;border-radius:13px}
table{width:100%;border-collapse:collapse;font-size:.83rem}
thead th{background:rgba(53,92,75,.05);padding:9px 13px;text-align:left;font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(0,0,0,.04);transition:background .12s}
tbody tr:hover{background:rgba(53,92,75,.03)}
tbody td{padding:9px 13px;vertical-align:middle}
tbody tr:last-child{border-bottom:none}

/* INPUTS */
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:.76rem;font-weight:500;color:var(--text)}
.fg input,.fg select,.fg textarea{height:40px;border:1.5px solid var(--sand2);border-radius:8px;background:rgba(255,255,255,.9);padding:0 11px;font-size:.85rem;color:var(--text);outline:none;transition:border-color .17s}
.fg textarea{height:72px;padding:9px 11px;resize:vertical}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--g)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap}
.btn-g{background:var(--g);color:#fff;padding:0 18px;height:38px;font-size:.84rem}
.btn-g:hover{background:var(--gd)}
.btn-gh{background:rgba(53,92,75,.07);color:var(--g);border:1.5px solid var(--border);padding:0 14px;height:36px;font-size:.82rem}
.btn-gh:hover{background:rgba(53,92,75,.13)}
.btn-r{background:#fee2e2;color:var(--red);border:1.5px solid #fca5a5;padding:0 13px;height:34px;font-size:.80rem}
.btn-r:hover{background:#fecaca}
.btn-a{background:#fef3c7;color:#92400e;border:1.5px solid #fcd34d;padding:0 13px;height:34px;font-size:.80rem}
.btn-sm{height:30px;padding:0 11px;font-size:.76rem;border-radius:6px}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.42);display:none;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal-ov.open{display:flex}
.modal{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.15);width:min(620px,100%);max-height:90vh;overflow-y:auto}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #f0ebe3}
.modal-h h3{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:400;color:var(--g)}
.modal-b{padding:20px 22px}
.modal-f{padding:14px 22px;border-top:1px solid #f0ebe3;display:flex;gap:9px;justify-content:flex-end}
.btn-x{background:none;border:none;font-size:1.3rem;color:var(--muted);cursor:pointer}

/* SEARCH */
.search-bar{display:flex;gap:9px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.search-input{height:38px;border:1.5px solid var(--sand2);border-radius:8px;background:#fff;padding:0 12px;font-size:.84rem;outline:none;width:240px;transition:border-color .17s}
.search-input:focus{border-color:var(--g)}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--sand2);margin-bottom:20px}
.tab{background:none;border:none;padding:9px 16px;font-size:.86rem;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .18s}
.tab.active{color:var(--g);border-bottom-color:var(--g);font-weight:500}
.tab:hover:not(.active){color:var(--text)}

/* CHECKIN CARDS */
.turma-card{background:#fff;border:1.5px solid var(--sand2);border-radius:13px;padding:16px 18px;margin-bottom:10px;transition:border-color .2s}
.turma-card.checked{border-color:var(--g);background:var(--gll)}
.turma-card.full{opacity:.6}
.turma-card.cancelada{opacity:.5;text-decoration:line-through}
.prog{height:7px;background:var(--sand2);border-radius:999px;margin:8px 0 5px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--g),#20c997);border-radius:999px;transition:width .3s}
.prog-fill.full{background:#ef4444}

/* CHARTS */
.chart-bar-item{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.chart-bar-item .lbl{font-size:.76rem;color:var(--muted);width:110px;flex-shrink:0}
.bar-outer{flex:1;height:18px;background:var(--sand2);border-radius:5px;overflow:hidden}
.bar-inner{height:100%;background:var(--g);border-radius:5px;transition:width .5s;display:flex;align-items:center;padding-left:7px}
.bar-inner span{font-size:.68rem;color:#fff;font-weight:600}
.bar-val{font-size:.76rem;font-weight:600;color:var(--text);width:36px;text-align:right;flex-shrink:0}

/* PERFIL HEADER */
.prof-header{display:flex;align-items:center;gap:18px;padding:20px 22px;background:linear-gradient(135deg,var(--g),var(--gd));border-radius:13px 13px 0 0;color:#fff}
.prof-av{width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:600;flex-shrink:0}
.prof-name{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:400}
.prof-det{font-size:.78rem;opacity:.75;margin-top:2px}

/* ALERTA */
.alerta{border-radius:10px;padding:11px 14px;font-size:.82rem;margin-bottom:14px}
.alerta-a{background:#fef3c7;border:1px solid #fcd34d;color:#78350f}
.alerta-r{background:#fee2e2;border:1px solid #fca5a5;color:#7f1d1d}
.alerta-g{background:#dcfce7;border:1px solid #86efac;color:#14532d}
.alerta-b{background:#dbeafe;border:1px solid #93c5fd;color:#1e3a8a}

/* SALDO AULAS */
.saldo-card{background:linear-gradient(135deg,var(--g),var(--gd));border-radius:13px;padding:20px 22px;color:#fff;margin-bottom:16px}
.saldo-num{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:400;line-height:1}
.saldo-lbl{font-size:.78rem;opacity:.75;margin-top:4px}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f5f0e8,#e8f0ec);padding:24px}
.login-box{background:#fff;border-radius:18px;padding:40px 36px;width:min(380px,100%);box-shadow:0 20px 60px rgba(0,0,0,.08)}
.login-err{background:#fee2e2;color:var(--red);border-radius:7px;padding:9px 13px;font-size:.8rem;margin-bottom:12px;display:none}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;color:#fff;padding:11px 16px;border-radius:9px;font-size:.83rem;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:999;display:none;max-width:300px;background:#0f172a}
.toast.show{display:block}
.toast.s{background:var(--g)}
.toast.e{background:var(--red)}
.toast.w{background:var(--amber)}

/\* â•â• MOBILE â•â• \*/
.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:200;background:var(--gd);border:none;border-radius:8px;width:42px;height:42px;cursor:pointer;align-items:center;justify-content:center;flex-direction:column;gap:5px}
.hamburger span{display:block;width:20px;height:2px;background:#fff;border-radius:2px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49}

@media(max-width:860px){
  .hamburger{display:flex}
  .sidebar{
    transform:translateX(-100%);
    transition:transform .25s ease;
    z-index:50;
    box-shadow:4px 0 20px rgba(0,0,0,.3)
  }
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .main{
    margin-left:0 !important;
    padding:64px 14px 24px;
    width:100%;
    min-height:100vh;
  }
  .stats-grid{grid-template-columns:1fr 1fr}
  .form-grid,.form-grid-3{grid-template-columns:1fr}
  .charts-grid{grid-template-columns:1fr !important}
  table{font-size:.76rem}
  thead th{padding:7px 8px}
  tbody td{padding:7px 8px}
}

#sistema:not(.hidden){display:flex;flex-direction:row;min-height:100vh;background:var(--sand)}
@media(max-width:860px){
  #sistema:not(.hidden){display:block}
  #main-content{width:100%;margin-left:0}
}

.form-grid,.form-grid-3{grid-template-columns:1fr}.main{padding:18px 16px}}
.stats-grid{grid-template-columns:1fr}.main{padding:14px 12px}}
}

  display:none;position:fixed;top:12px;left:12px;z-index:300;
  background:var(--gd);border:none;border-radius:8px;

@media(max-width:800px){
  :root{--sb-w:240px}
  .hamburger{display:flex}
  .sidebar{transform:translateX(-100%);transition:transform .25s;z-index:50}

  .sb-overlay.mob-open{display:block}

  .stats-grid{grid-template-columns:1fr 1fr}
  .form-grid,.form-grid-3{grid-template-columns:1fr}

}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr}
  .pg-title{font-size:1.5rem}
}

  #sistema:not(.hidden){display:block}
}

<body>

<!-- LOGIN -->

async function sbFetch(path, options={}) {
  const url = SUPABASE_URL + '/rest/v1/' + path;
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': options.prefer || 'return=representation',
    ...( options.headers || {} )
  };
  const res = await fetch(url, { method: options.method || 'GET', headers, body: options.body ? JSON.stringify(options.body) : undefined, mode: 'cors' });
  if (!res.ok) { const t = await res.text(); console.error('Supabase erro:', res.status, t); return null; }
  if (res.status === 204) return [];
  return res.json();
}

function normalizarDataInput(valor){
  var v=String(valor||'').trim();
  if(!v)return '';
  if(/^\d{4}-\d{2}-\d{2}$/.test(v))return v;
  var m=v.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if(m)return m[3]+'-'+m[2]+'-'+m[1];
  return v;
}
function alunoFromDb(row){
  const out={...(row||{})};
  Object.entries(ALUNO_FIELD_MAP).forEach(([db,app])=>{
    if(out[db]!==undefined&&out[app]===undefined)out[app]=out[db];
  });
  if(out.nascimento)out.nascimento=normalizarDataInput(out.nascimento);
  return out;
}
function alunoToDb(aluno){
  const src=aluno||{};
  const out={};
  ALUNO_DB_FIELDS.forEach(function(db){
    const app=ALUNO_FIELD_MAP[db]||db;
    if(src[app]!==undefined)out[db]=src[app];
    else if(src[db]!==undefined)out[db]=src[db];
  });
  return out;
}

  var extra=[];
  rows.forEach(function(a){Object.keys(a).forEach(function(k){if(ALUNO_EXPORT_FIELDS.indexOf(k)<0&&extra.indexOf(k)<0)extra.push(k);});});
  var fields=ALUNO_EXPORT_FIELDS.concat(extra);
  var nl=String.fromCharCode(10);
  var csv=String.fromCharCode(65279)+fields.join(';')+nl+rows.map(function(a){return fields.map(function(f){return csvEscape(a[f]);}).join(';');}).join(nl);
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='base-alunos-alma.csv';
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);
  toast('Base exportada','s');
}
function parseCsvLine(line,sep){
  var out=[],cur='',q=false;
  for(var i=0;i<line.length;i++){
    var ch=line[i];
    if(ch==='"'){
      if(q&&line[i+1]==='"'){cur+='"';i++;}
      else q=!q;
    }else if(ch===sep&&!q){out.push(cur);cur='';}
    else cur+=ch;
  }
  out.push(cur);return out;
}
function parseCsv(text){
  var nl=String.fromCharCode(10),cr=String.fromCharCode(13);
  text=String(text||'').replace(/^ï»¿/,'').split(cr+nl).join(nl).split(cr).join(nl).trim();
  if(!text)return[];
  var lines=text.split(nl).filter(function(l){return l.trim()!=='';});
  var sep=(lines[0].split(';').length>=lines[0].split(',').length)?';':',';
  var headers=parseCsvLine(lines.shift(),sep).map(function(h){return h.trim();});
  return lines.map(function(line){
    var vals=parseCsvLine(line,sep),obj={};
    headers.forEach(function(h,i){obj[h]=vals[i]||'';});
    if(obj.pacoteAulas!==undefined)obj.pacoteAulas=parseInt(obj.pacoteAulas)||0;
    if(obj.aulas_avulsas!==undefined)obj.aulas_avulsas=parseInt(obj.aulas_avulsas)||0;
    if(obj.checkinLiberado==='true')obj.checkinLiberado=true;
    if(obj.checkinLiberado==='false')obj.checkinLiberado=false;
    if(obj.permitirEditarHorarios==='true')obj.permitirEditarHorarios=true;
    if(obj.permitirEditarHorarios==='false')obj.permitirEditarHorarios=false;
    if(obj.horariosAlteracaoAprovada==='true')obj.horariosAlteracaoAprovada=true;
    if(obj.horariosAlteracaoAprovada==='false')obj.horariosAlteracaoAprovada=false;
    if(!obj.id)obj.id='aluno_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    if(!obj.perfil)obj.perfil='Aluno';
    return obj;
  });
}
function importarAlunosExcel(ev){
  var file=ev.target.files&&ev.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(){
    try{
      var rows=parseCsv(String(reader.result||''));
      if(!rows.length){toast('Arquivo vazio ou invÃ¡lido','e');return;}
      if(!confirm('Importar esta base vai substituir a base atual de alunos. Continuar?'))return;
      SA(rows);addLog('import_alunos',{total:rows.length});toast('Base importada','s');pgAlunos(document.getElementById('main-content'));
    }catch(e){toast('NÃ£o foi possÃ­vel importar a base','e');}
    ev.target.value='';
  };
  reader.readAsText(file,'utf-8');
}

  var fim=document.getElementById('sol-fim')?.value||'';

  var pessoa=(document.getElementById('sol-pessoa')?.value||'').toLowerCase();
  if(ini)sols=sols.filter(function(s){return (s.ts||'').slice(0,10)>=ini;});
  if(fim)sols=sols.filter(function(s){return (s.ts||'').slice(0,10)<=fim;});
  if(st)sols=sols.filter(function(s){return s.status===st;});
  if(pessoa)sols=sols.filter(function(s){return String(s.nomeAluno||'').toLowerCase().includes(pessoa);});
  var pendentes=GS().filter(function(s){return s.status==='pendente';}).length;
  var alertDiv=document.getElementById('sol-alert');
  if(alertDiv){
    var html='';
    if(pendentes)html+='<div class="alerta alerta-a" style="margin-bottom:10px">âš ï¸ '+pendentes+' solicitaÃ§Ã£o(Ãµes) pendente(s) aguardando aprovaÃ§Ã£o</div>';
    var alertasSaldo=verificarAlertasSaldoStatus();
    if(alertasSaldo.length){

function processarSol(id,decisao){
  var sols=GS();var idx=sols.findIndex(function(s){return s.id===id;});if(idx<0)return;
  var s=sols[idx];
  s.status=decisao;s.processadoEm=new Date().toISOString();s.processadoPor=CU.nome;
  sols[idx]=s;SS(sols);
  if(decisao==='aprovado'){
    var alunos=GA();var ai=alunos.findIndex(function(a){return a.id===s.userId;});
    if(ai>=0){
      if(s.tipo==='matricula'){
        alunos[ai].status='Ativa';
        alunos[ai].checkinLiberado=true;
        if(!String(alunos[ai].vencMensalidade||'').trim())alunos[ai].vencMensalidade=vencimentoDefaultMatricula(s.processadoEm||new Date());
      }
      else if(s.tipo==='pausa'){alunos[ai].status=cleanKey(s.motivo).includes('les')?'LesÃ£o':'Viagem';alunos[ai].pausaInicioEm=new Date().toISOString();}
      else if(s.tipo==='cancelamento'){alunos[ai].status='Inativa';}
      else if(s.tipo==='compra_aula'){
        // Creditar saldo aprovado
        var qtd=parseInt(s.quantidadeAulas)||0;
        var tipoCom=s.tipoCompra||'';
        if(/pacote/i.test(tipoCom)){
          alunos[ai].pacoteAulas=(alunos[ai].pacoteAulas||0)+qtd;
          if(!alunos[ai].pacoteExpira)alunos[ai].pacoteExpira=setPacoteExpira();
        } else {
          // avulsa comprada: crÃ©dito unitÃ¡rio, separado de reposiÃ§Ã£o
          var repos=GR();
          for(var _q=0;_q<qtd;_q++){
            repos.push({id:'r'+Date.now()+_q,userId:s.userId,nomeAluno:s.nomeAluno,status:'disponivel',geradoEm:new Date().toISOString(),origem:'compra_avulsa'});
          }
          SR(repos);
          alunos[ai].aulas_avulsas=avulsasDisponiveisAluno(alunos[ai]).length;
        }
        alunos[ai].aulas_repos=reposicoesDisponiveisAluno(alunos[ai]).length;
      }
      else if(s.tipo==='alteracao_vencimento'){
        var novo=s.motivo.replace('Novo vencimento: Dia ','');
        alunos[ai].vencMensalidade=novo;
      }
      else if(s.tipo==='alteracao_plano'){
        var novop=s.motivo.replace('Novo plano: ','');
        alunos[ai].databaseAlunos=novop;
        alunos[ai].permitirEditarHorarios=true;
        alunos[ai].horariosAlteracaoAprovada=true;
      }
      else if(s.tipo==='alteracao_horarios'){
        alunos[ai].permitirEditarHorarios=true;
        alunos[ai].horariosAlteracaoAprovada=true;
      }
      SA(alunos);
    }
  }
  addLog('sol_'+decisao,{tipo:s.tipo,aluno:s.nomeAluno});
  toast(decisao==='aprovado'?'Aprovado!':'Recusado','s');
  pgSolicitacoes(document.getElementById('main-content'));
}

  }

  // Descontar saldo comprado ou reposiÃ§Ã£o
  var repoUsadaId='';
  if(tipoFinal==='pacote'&&!isG()){
    var alunos=GA();var ai=alunos.findIndex(function(a){return a.id===CU.id;});

function normalizarHorarioLote(h){
  h=String(h||'').trim();
  if(!h)return'';
  h=h.replace('h',':').replace('H',':');
  if(/^\d{1,2}$/.test(h))h=h.padStart(2,'0')+':00';
  else if(/^\d{1,2}:\d{1,2}$/.test(h)){
    var p=h.split(':');
    h=p[0].padStart(2,'0')+':'+p[1].padStart(2,'0');
  }
  return /^\d{2}:\d{2}$/.test(h)?h:'';
}
function criarLote(){
  const ini=new Date(document.getElementById('lt-ini').value+'T12:00:00');
  const fim=new Date(document.getElementById('lt-fim').value+'T12:00:00');
  const dias=[...document.querySelectorAll('.lt-dia:checked')].map(c=>c.value);
  const hors=document.getElementById('lt-h').value.trim().split(/[,\n;]+/).map(normalizarHorarioLote).filter(Boolean);
  const vagas=parseInt(document.getElementById('lt-v').value)||16;
  if(isNaN(ini.getTime())||isNaN(fim.getTime())){toast('Datas invÃ¡lidas','e');return;}
  if(!dias.length){toast('Selecione os dias','e');return;}
  if(!hors.length){toast('Informe os horÃ¡rios','e');return;}
  const mapD={Segunda:1,Terca:2,Quarta:3,Quinta:4,Sexta:5,Sabado:6};
  const turmas=GT();let n=0;
  const cur=new Date(ini);
  while(cur<=fim){
    const dow=cur.getDay();
    const ds=Object.keys(mapD).find(k=>mapD[k]===dow);
    if(ds&&dias.includes(ds)){
      const dStr=cur.toISOString().split('T')[0];
      hors.forEach(h=>{
        turmas.push({id:'t'+Date.now()+Math.random(),dia:dStr,horario:h,vagas,label:'',status:'ativa',criadoPor:CU.nome});
        n++;
      });
    }
    cur.setDate(cur.getDate()+1);
  }
  ST(turmas);toast(`${n} turmas criadas!`,'s');pgTurmas(document.getElementById('main-content'));
}

function processarInadimplentes(){
  var raw=document.getElementById('inadim-input').value.trim();
  if(!raw){ toast('Cole ao menos um e-mail ou CPF','e'); return; }
  var chaves=raw.split('\n').map(function(s){ return s.trim().toLowerCase(); }).filter(Boolean);
  var alunos=GA();
  var bloqueados=getInadimplentes();
  var adicionados=0;
  chaves.forEach(function(chave){
    var aluno=alunos.find(function(a){
      return a.email.toLowerCase()===chave || a.cpf===chave.replace(/\D/g,'');
    });
    if(!aluno){ return; }
    if(bloqueados.find(function(b){ return b.id===aluno.id; })){ return; }
    bloqueados.push({
      id:aluno.id, nome:aluno.nome, email:aluno.email, cpf:aluno.cpf,
      statusAnterior:aluno.status||'Ativa',
      bloqueadoEm:new Date().toISOString()
    });
    aluno.status='Bloqueado';
    adicionados++;
  });
  SA(alunos);
  setInadimplentes(bloqueados);
  addLog('bloquear_inadimplencia',{qtd:adicionados});
  toast(adicionados+' aluno(s) bloqueado(s)','s');
  document.getElementById('inadim-input').value='';
  pgInadimplencia(document.getElementById('main-content'));
}

function desbloquear(id){
  var lista=getInadimplentes();
  var item=lista.find(function(x){return x.id===id;});
  var alunos=GA();var ai=alunos.findIndex(function(a){return a.id===id;});
  if(ai>=0&&alunos[ai].status==='Bloqueado')alunos[ai].status=(item&&item.statusAnterior&&item.statusAnterior!=='Bloqueado')?item.statusAnterior:'Ativa';
  SA(alunos);
  setInadimplentes(lista.filter(function(x){ return x.id!==id; }));
  addLog('desbloquear_inadimplencia',{id:id});
  toast('Aluno desbloqueado','s');
  pgInadimplencia(document.getElementById('main-content'));
}

}
function checkinsPlanoNoPeriodo(alunoId,venc){
  var v=parseInt(venc)||3;
  var p=getPeriodo(v);
  return GC().filter(function(c){
    return c.userId===alunoId&&c.status!=='cancelado'&&c.dia>=p.iniStr&&['pacote','avulsa','repos','gestor'].indexOf(c.tipo)===-1;
  }).length;
}
function tipoCheckinParaAluno(aluno,dia){
  if(!aluno)return'';
  var pacote=(aluno.pacoteAulas||0)>0;
  var avulsa=avulsasDisponiveisAluno(aluno).length>0;
  var repos=reposicoesDisponiveisAluno(aluno).length>0;
  if(isSabado(dia)){
    var feitosSab=GC().filter(function(c){return c.dia===dia&&c.userId===aluno.id&&c.status!=='cancelado';}).length;
    if(isAWA(aluno)&&feitosSab===0)return 'awa';
    if(pacote)return 'pacote';
    if(avulsa)return 'avulsa';
    return '';
  }
  if(isPacote(aluno))return pacote?'pacote':'';
  if(isAWA(aluno))return 'awa';
  var aulasDir=calcSaldoPeriodo(aluno);
  var usadas=checkinsPlanoNoPeriodo(aluno.id,aluno.vencMensalidade);
  if(aulasDir>usadas)return 'normal';
  if(pacote)return 'pacote';
  if(avulsa)return 'avulsa';
  if(repos)return 'repos';
  return '';
}
function saldoCheckinDisponivel(aluno,dia){
  expirarReposicoes(aluno);
  if(!controlaSaldoAluno(aluno))return 999;
  var tipo=tipoCheckinParaAluno(aluno,dia);
  if(!tipo)return 0;
  if(tipo==='awa')tipo='normal';
  if(tipo==='pacote')return aluno.pacoteAulas||0;
  if(tipo==='avulsa')return avulsasDisponiveisAluno(aluno).length;
  var aulasDir=calcSaldoPeriodo(aluno);
  var usadas=checkinsPlanoNoPeriodo(aluno.id,aluno.vencMensalidade);
  var saldoPlano=Math.max(0,aulasDir-usadas);
  if(!isSabado(dia))saldoPlano+=reposicoesDisponiveisAluno(aluno).length;
  return tipo==='repos'?reposicoesDisponiveisAluno(aluno).length:saldoPlano;
}
function geradoEmReposicaoPeriodoAnterior(aluno){
  var v=parseInt(aluno&&aluno.vencMensalidade)||3;
  var p=getPeriodo(v);
  var d=new Date(p.ini.getFullYear(),p.ini.getMonth()-1,v,12,0,0,0);
  return d.toISOString();
}
function dataExpiraReposicao(r,aluno){
  var v=parseInt(aluno&&aluno.vencMensalidade)||3;
  var gerado=new Date(r.geradoEm);
  var vencSubs=new Date(gerado.getFullYear(),gerado.getMonth()+1,v);
  return new Date(vencSubs.getTime()+(parseInt(paramRegras().reposicaoExpiraDias)||14)*864e5);
}
function sincronizarCreditosGestao(aluno,qtdAvulsas,qtdRepos){
  var alunoId=aluno.id,nomeAluno=aluno.nome;
  var repos=GR();
  function ajustar(origem,qtd){
    var isAvulsa=origem==='compra_avulsa';
    var atual=repos.filter(function(r){return r.userId===alunoId&&r.status==='disponivel'&&((r.origem==='compra_avulsa')===isAvulsa);});
    if(!isAvulsa){
      var geradoRepos=geradoEmReposicaoPeriodoAnterior(aluno);
      atual.forEach(function(r){r.geradoEm=geradoRepos;});
    }
    while(atual.length<qtd){
      var novo={id:'r'+Date.now()+Math.random(),userId:alunoId,nomeAluno:nomeAluno,status:'disponivel',geradoEm:isAvulsa?new Date().toISOString():geradoEmReposicaoPeriodoAnterior(aluno),origem:origem};
      repos.push(novo);atual.push(novo);
    }
    while(atual.length>qtd){
      var rem=atual.pop();
      var idx=repos.findIndex(function(r){return r.id===rem.id;});
      if(idx>=0)repos.splice(idx,1);
    }
  }
  ajustar('compra_avulsa',Math.max(0,parseInt(qtdAvulsas)||0));
  ajustar('ajuste_gestao',Math.max(0,parseInt(qtdRepos)||0));
  SR(repos);
}

function controlaSaldoAluno(a){if(a&&(a.perfil==='Parceiro'||a.perfil==='Matina'))return false;var lista=(paramCheckin().controlarSaldoNiveis||[]).map(function(n){return cleanKey(n);});var nivel=cleanKey(a&&a.nivel||'');return !nivel||lista.some(function(n){return nivel.includes(n)||n.includes(nivel);});}
function niveisVisiveis(nivel){

  if(n.includes('avan')) return ['Avancado','AvanÃ§ado','Intermediario','IntermediÃ¡rio','Iniciante'];

function isManha(horario){var h=parseInt((horario||'0').split(':')[0]);return h>=6&&h<12;}
function getCutoff(dia,horario){

/* == DIAS POR PLANO == */
var DIAS_SEMANA = ['Segunda','Terca','Quarta','Quinta','Sexta'];
var DIAS_AWA    = ['Segunda','Terca','Quarta','Quinta','Sexta','Sabado'];

function diasPermitidos(plano){
  var p = (plano||'').toLowerCase();
  if(/^awa$/i.test(p.trim())) return DIAS_AWA;
  return DIAS_SEMANA;
}

function maxDiasSemana(plano){
  var p=planoConfig(plano);
  if(p&&String(p.tipo||'').toLowerCase().includes('mensalidade'))return Number(p.quantidade||p.aulasSemana)||0;
  var n=normPlano(plano);
  var m=n.match(/^(\d+)x/);
  if(m)return parseInt(m[1]);
  if(/^awa$/i.test(n))return 6;
  return 0;
}

function isPlanoDias(aluno){
  // Retorna true se o aluno precisa escolher dias fixos
  var p = normPlano(aluno.databaseAlunos||aluno.plano||'');
  return /^\d+x$/.test(p) || /^awa$/.test(p);
}

function linhasParam(id){return (document.getElementById(id).value||'').split(/\n|,/).map(function(s){return s.trim();}).filter(Boolean);}
function salvarParamPlanos(){
  var cfg=GP();var linhas=(document.getElementById('param-planos').value||'').split('\n');
  cfg.planos=linhas.map(function(l){
    var p=l.split(';').map(function(x){return x.trim();});
    if(!p[0])return null;
    if(p.length<=4){
      var qtd=parseInt(p[2])||0;
      return{nome:p[0],valor:parseFloat(String(p[1]||'0').replace(',','.'))||0,tipo:qtd>0?'mensalidade':'',quantidade:qtd,periodo:qtd>0?'por semana':'',diasPermitidos:'',validade:qtd>0?'ciclo mensal/vencimento':'',alunoPodeSolicitar:true,aulasSemana:qtd,ativo:!(/^n/i.test(p[3]||''))};
    }
    var qtd=parseInt(p[3])||0;
    var tipo=p[2]||'';
    return{nome:p[0],valor:parseFloat(String(p[1]||'0').replace(',','.'))||0,tipo:tipo,quantidade:qtd,periodo:p[4]||'',diasPermitidos:p[5]||'',validade:p[6]||'',alunoPodeSolicitar:!(/^n/i.test(p[7]||'')),aulasSemana:/mensalidade/i.test(tipo)?qtd:0,ativo:!(/^n/i.test(p[8]||''))};
  }).filter(Boolean);
  SP(cfg);addLog('edit_parametros',{aba:'planos'});toast('Planos salvos','s');paramTab('planos');
}
