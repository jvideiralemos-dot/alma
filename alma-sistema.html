<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Alma Futevôlei — Sistema</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{
  --g:#355C4B;--gd:#243f33;--gl:#e8f0ec;--gll:#f0f7f4;
  --sand:#F5F0E8;--sand2:#ede5d6;--sand3:#f9f6f0;
  --text:#2a2824;--muted:#6b6358;
  --card:rgba(255,255,255,0.92);
  --border:rgba(53,92,75,0.15);
  --red:#dc2626;--amber:#d97706;--blue:#2563eb;--purple:#7c3aed;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--sand);font-family:'DM Sans',sans-serif;color:var(--text);overflow-x:hidden}
button{cursor:pointer;font-family:'DM Sans',sans-serif}
input,select,textarea{font-family:'DM Sans',sans-serif}
.hidden{display:none!important}
.serif{font-family:'Cormorant Garamond',serif}

/* BADGES */
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:500}
.b-ativa,.b-ativo{background:#dcfce7;color:#15803d}
.b-inativa,.b-inativo{background:#fee2e2;color:var(--red)}
.b-pausada,.b-pausado{background:#fef3c7;color:var(--amber)}
.b-cancelamento{background:#ede9fe;color:var(--purple)}
.b-iniciante{background:#dcfce7;color:#15803d}
.b-intermediario{background:#fef3c7;color:var(--amber)}
.b-avancado{background:#fee2e2;color:var(--red)}
.b-gestor{background:#dbeafe;color:var(--blue)}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sb-w,220px);background:var(--gd);display:flex;flex-direction:column;z-index:50;transition:width .2s;overflow:hidden;visibility:visible}
.sb-logo{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo img.ico{width:30px;filter:brightness(0) invert(1);opacity:.85}
.sb-logo img.txt{width:85px;filter:brightness(0) invert(1);opacity:.90;display:block;margin-top:3px}
.sb-logo .tag{font-size:6.5px;text-transform:uppercase;letter-spacing:.5em;color:rgba(255,255,255,.4);margin-top:2px}
.sb-user{padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-user .uname{font-size:.83rem;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user .uinfo{font-size:.70rem;color:rgba(255,255,255,.5);margin-top:1px}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-section{padding:10px 18px 3px;font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.3)}
.sb-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 18px;background:none;border:none;color:rgba(255,255,255,.70);font-size:.84rem;transition:all .15s;text-align:left}
.sb-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-btn.active{background:rgba(255,255,255,.14);color:#fff;font-weight:500}
.sb-btn svg{width:16px;height:16px;flex-shrink:0;opacity:.75}
.sb-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.1)}
.btn-sair{width:100%;padding:8px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.12);border-radius:7px;font-size:.8rem;transition:all .2s}
.btn-sair:hover{background:rgba(255,255,255,.15);color:#fff}

/* MAIN */
.main{margin-left:var(--sb-w,220px);min-height:100vh;padding:24px 26px;flex:1;min-width:0;background:var(--sand)}
.pg-title{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:400;color:var(--g);margin-bottom:4px}
.pg-sub{font-size:.82rem;color:var(--muted);margin-bottom:22px}

/* CARDS */
.card{background:var(--card);border:1px solid rgba(255,255,255,.88);border-radius:14px;box-shadow:0 3px 16px rgba(50,40,20,.06)}
.cp{padding:20px 22px}
.card-title{font-size:.74rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:12px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid rgba(255,255,255,.88);border-radius:13px;padding:16px 18px;box-shadow:0 2px 12px rgba(50,40,20,.05)}
.stat-v{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:400;color:var(--g);line-height:1}
.stat-l{font-size:.74rem;color:var(--muted);margin-top:4px}
.stat-s{font-size:.70rem;color:var(--g);margin-top:2px;font-weight:500}

/* TABLES */
.tbl-wrap{overflow-x:auto;border-radius:13px}
table{width:100%;border-collapse:collapse;font-size:.83rem}
thead th{background:rgba(53,92,75,.05);padding:9px 13px;text-align:left;font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(0,0,0,.04);transition:background .12s}
tbody tr:hover{background:rgba(53,92,75,.03)}
tbody td{padding:9px 13px;vertical-align:middle}
tbody tr:last-child{border-bottom:none}

/* INPUTS */
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:.76rem;font-weight:500;color:var(--text)}
.fg input,.fg select,.fg textarea{height:40px;border:1.5px solid var(--sand2);border-radius:8px;background:rgba(255,255,255,.9);padding:0 11px;font-size:.85rem;color:var(--text);outline:none;transition:border-color .17s}
.fg textarea{height:72px;padding:9px 11px;resize:vertical}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--g)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap}
.btn-g{background:var(--g);color:#fff;padding:0 18px;height:38px;font-size:.84rem}
.btn-g:hover{background:var(--gd)}
.btn-gh{background:rgba(53,92,75,.07);color:var(--g);border:1.5px solid var(--border);padding:0 14px;height:36px;font-size:.82rem}
.btn-gh:hover{background:rgba(53,92,75,.13)}
.btn-r{background:#fee2e2;color:var(--red);border:1.5px solid #fca5a5;padding:0 13px;height:34px;font-size:.80rem}
.btn-r:hover{background:#fecaca}
.btn-a{background:#fef3c7;color:#92400e;border:1.5px solid #fcd34d;padding:0 13px;height:34px;font-size:.80rem}
.btn-sm{height:30px;padding:0 11px;font-size:.76rem;border-radius:6px}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.42);display:none;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal-ov.open{display:flex}
.modal{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.15);width:min(620px,100%);max-height:90vh;overflow-y:auto}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #f0ebe3}
.modal-h h3{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:400;color:var(--g)}
.modal-b{padding:20px 22px}
.modal-f{padding:14px 22px;border-top:1px solid #f0ebe3;display:flex;gap:9px;justify-content:flex-end}
.btn-x{background:none;border:none;font-size:1.3rem;color:var(--muted);cursor:pointer}

/* SEARCH */
.search-bar{display:flex;gap:9px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.search-input{height:38px;border:1.5px solid var(--sand2);border-radius:8px;background:#fff;padding:0 12px;font-size:.84rem;outline:none;width:240px;transition:border-color .17s}
.search-input:focus{border-color:var(--g)}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--sand2);margin-bottom:20px}
.tab{background:none;border:none;padding:9px 16px;font-size:.86rem;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .18s}
.tab.active{color:var(--g);border-bottom-color:var(--g);font-weight:500}
.tab:hover:not(.active){color:var(--text)}

/* CHECKIN CARDS */
.turma-card{background:#fff;border:1.5px solid var(--sand2);border-radius:13px;padding:16px 18px;margin-bottom:10px;transition:border-color .2s}
.turma-card.checked{border-color:var(--g);background:var(--gll)}
.turma-card.full{opacity:.6}
.turma-card.cancelada{opacity:.5;text-decoration:line-through}
.prog{height:7px;background:var(--sand2);border-radius:999px;margin:8px 0 5px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--g),#20c997);border-radius:999px;transition:width .3s}
.prog-fill.full{background:#ef4444}

/* CHARTS */
.chart-bar-item{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.chart-bar-item .lbl{font-size:.76rem;color:var(--muted);width:110px;flex-shrink:0}
.bar-outer{flex:1;height:18px;background:var(--sand2);border-radius:5px;overflow:hidden}
.bar-inner{height:100%;background:var(--g);border-radius:5px;transition:width .5s;display:flex;align-items:center;padding-left:7px}
.bar-inner span{font-size:.68rem;color:#fff;font-weight:600}
.bar-val{font-size:.76rem;font-weight:600;color:var(--text);width:36px;text-align:right;flex-shrink:0}

/* PERFIL HEADER */
.prof-header{display:flex;align-items:center;gap:18px;padding:20px 22px;background:linear-gradient(135deg,var(--g),var(--gd));border-radius:13px 13px 0 0;color:#fff}
.prof-av{width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:600;flex-shrink:0}
.prof-name{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:400}
.prof-det{font-size:.78rem;opacity:.75;margin-top:2px}

/* ALERTA */
.alerta{border-radius:10px;padding:11px 14px;font-size:.82rem;margin-bottom:14px}
.alerta-a{background:#fef3c7;border:1px solid #fcd34d;color:#78350f}
.alerta-r{background:#fee2e2;border:1px solid #fca5a5;color:#7f1d1d}
.alerta-g{background:#dcfce7;border:1px solid #86efac;color:#14532d}
.alerta-b{background:#dbeafe;border:1px solid #93c5fd;color:#1e3a8a}

/* SALDO AULAS */
.saldo-card{background:linear-gradient(135deg,var(--g),var(--gd));border-radius:13px;padding:20px 22px;color:#fff;margin-bottom:16px}
.saldo-num{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:400;line-height:1}
.saldo-lbl{font-size:.78rem;opacity:.75;margin-top:4px}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f5f0e8,#e8f0ec);padding:24px}
.login-box{background:#fff;border-radius:18px;padding:40px 36px;width:min(380px,100%);box-shadow:0 20px 60px rgba(0,0,0,.08)}
.login-err{background:#fee2e2;color:var(--red);border-radius:7px;padding:9px 13px;font-size:.8rem;margin-bottom:12px;display:none}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;color:#fff;padding:11px 16px;border-radius:9px;font-size:.83rem;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:999;display:none;max-width:300px;background:#0f172a}
.toast.show{display:block}
.toast.s{background:var(--g)}
.toast.e{background:var(--red)}
.toast.w{background:var(--amber)}

/\* ══ MOBILE ══ \*/
.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:200;background:var(--gd);border:none;border-radius:8px;width:42px;height:42px;cursor:pointer;align-items:center;justify-content:center;flex-direction:column;gap:5px}
.hamburger span{display:block;width:20px;height:2px;background:#fff;border-radius:2px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49}

@media(max-width:860px){
  .hamburger{display:flex}
  .sidebar{
    transform:translateX(-100%);
    transition:transform .25s ease;
    z-index:50;
    box-shadow:4px 0 20px rgba(0,0,0,.3)
  }
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .main{
    margin-left:0 !important;
    padding:64px 14px 24px;
    width:100%;
    min-height:100vh;
  }
  .stats-grid{grid-template-columns:1fr 1fr}
  .form-grid,.form-grid-3{grid-template-columns:1fr}
  .charts-grid{grid-template-columns:1fr !important}
  table{font-size:.76rem}
  thead th{padding:7px 8px}
  tbody td{padding:7px 8px}
}

#sistema:not(.hidden){display:flex;flex-direction:row;min-height:100vh;background:var(--sand)}
@media(max-width:860px){
  #sistema:not(.hidden){display:block}
  #main-content{width:100%;margin-left:0}
}

.stats-grid{grid-template-columns:1fr 1fr}}
.form-grid,.form-grid-3{grid-template-columns:1fr}.main{padding:18px 16px}}
.stats-grid{grid-template-columns:1fr}.main{padding:14px 12px}}
}

/* ══ HAMBURGER ══ */
.hamburger{
  display:none;position:fixed;top:12px;left:12px;z-index:300;
  background:var(--gd);border:none;border-radius:8px;
  width:44px;height:44px;cursor:pointer;
  flex-direction:column;align-items:center;justify-content:center;gap:5px;
}
.hamburger span{display:block;width:20px;height:2px;background:#fff;border-radius:2px}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:49}

@media(max-width:800px){
  :root{--sb-w:240px}
  .hamburger{display:flex}
  .sidebar{transform:translateX(-100%);transition:transform .25s;z-index:50}
  .sidebar.mob-open{transform:translateX(0)}
  .sb-overlay.mob-open{display:block}
  .main{margin-left:0!important;padding:60px 14px 24px;width:100%}
  .stats-grid{grid-template-columns:1fr 1fr}
  .form-grid,.form-grid-3{grid-template-columns:1fr}
  .charts-grid{grid-template-columns:1fr!important}
  table{font-size:.76rem}
  thead th,tbody td{padding:6px 8px}
  .tbl-wrap{overflow-x:auto}
  .modal{width:calc(100vw - 32px)}
  .modal-b{padding:16px}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr}
  .pg-title{font-size:1.5rem}
}
#sistema:not(.hidden){display:flex;flex-direction:row}
@media(max-width:800px){
  #sistema:not(.hidden){display:block}
}


/* AJUSTE MENU MOBILE - 2026-06-08 */
:root{--sb-w:205px}
.sidebar{width:var(--sb-w,205px)}
.main{margin-left:var(--sb-w,205px)}
.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:300;background:var(--gd);border:none;border-radius:8px;width:42px;height:42px;cursor:pointer;align-items:center;justify-content:center;flex-direction:column;gap:5px}
.hamburger span{display:block;width:20px;height:2px;background:#fff;border-radius:2px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:49}
@media(max-width:860px){
  #sistema:not(.hidden){display:block!important}
  .hamburger{display:flex}
  .sidebar{width:205px;transform:translateX(-100%);transition:transform .25s ease;z-index:50;box-shadow:4px 0 20px rgba(0,0,0,.22)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .main{margin-left:0!important;padding:64px 14px 24px;width:100%;min-height:100vh}
  .sb-logo{padding:18px 16px 12px}
  .sb-user{padding:12px 16px}
  .sb-section{padding:10px 16px 3px}
  .sb-btn{padding:9px 16px;font-size:.84rem;gap:8px}
  .sb-foot{padding:14px 16px}
}
</style>
</head>

  var config=DB.get('turmashor_config',{});
  if(!config[nivel])config[nivel]={};
  var dias=['Segunda','Terca','Quarta','Quinta','Sexta','Sabado'];
  dias.forEach(function(dia){
    var inp=document.getElementById('th-'+nivel+'-'+dia);
    if(!inp)return;
    var val=inp.value.trim();
    config[nivel][dia]=val?val.split(',').map(function(h){return h.trim();}).filter(Boolean):[];
  });
  DB.set('turmashor_config',config);
  addLog('edit_turmashor',{nivel:nivel});
  toast('Horários do '+nivel+' salvos!','s');
}

function hoje(){return new Date().toISOString().split('T')[0]}
function fmtData(s){return s?s.split('-').reverse().join('/'):'—'}
function normPlano(p){
  if(!p)return'';
  const l=p.toLowerCase();
  if(/^awa$/i.test(l.trim()))return'awa';
  if(/pacote/i.test(l))return'pacote';
  if(/avuls/i.test(l))return'avulso';
  if(/^\d+x$/i.test(l.trim()))return l.trim();
  return l;
}
function planoTimes(u){
  const p=normPlano(u.plano||u.databaseAlunos||'');
  const m=p.match(/^(\d+)x$/);
  return m?parseInt(m[1]):0;
}
function isLocked(diaYmd){
  const [y,m,d]=diaYmd.split('-').map(Number);
  const c=new Date(y,m-1,d);c.setDate(c.getDate()-1);c.setHours(21,0,0,0);
  return new Date()>c;
}

  const faixas={'<20':0,'20-29':0,'30-39':0,'40-49':0,'50+':0,'N/D':0};
  all.forEach(a=>{
    const nasc=a.nascimento;
    if(!nasc){faixas['N/D']++;return;}
    const parts=nasc.includes('/')
      ?nasc.split('/')

    if(age<20)faixas['<20']++;
    else if(age<30)faixas['20-29']++;
    else if(age<40)faixas['30-39']++;
    else if(age<50)faixas['40-49']++;
    else faixas['50+']++;
  });
  const maxP=Math.max(...Object.values(planos),1);
  const maxF=Math.max(...Object.values(faixas),1);
  el.innerHTML=`

/* == FLUXO DE CAIXA == */
function pgFluxo(el){
  const ativos=GA().filter(a=>a.perfil!=='Gestor'&&a.status==='Ativa');
  const PRECOS={
    '1x':220,'2x':270,'3x':320,'4x':380,'5x':420,'awa':470,
    'Trimestral':320,'Semestral':320,'Semestral ':320,
    'Pacote M0':0,'Parceria':0,'Lesão':0,'Viagem':0
  };
  const vencs={5:[],15:[],30:[],outro:[]};
  ativos.forEach(a=>{
    const v=parseInt(a.vencMensalidade)||0;
    if(v===5)vencs[5].push(a);
    else if(v===15)vencs[15].push(a);
    else if(v===30)vencs[30].push(a);
    else vencs['outro'].push(a);
  });
  function calcReceita(lista){
    return lista.reduce((s,a)=>{
      const p=normPlano(a.databaseAlunos||a.plano||'');
      const pr=PRECOS[p]||PRECOS[a.databaseAlunos||'']||0;
      return s+pr;
    },0);
  }
  const total=calcReceita(ativos);
  el.innerHTML=`
  <div class="pg-title">Fluxo de Caixa</div>
  <div class="pg-sub">Estimativa mensal por vencimento</div>
  <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
    ${[5,15,30].map(v=>{
      const lista=vencs[v];
      const rec=calcReceita(lista);
      return`<div class="stat-card">
        <div class="stat-v">R$ ${rec.toLocaleString('pt-BR')}</div>
        <div class="stat-l">Vencimento dia ${v}</div>
        <div class="stat-s">${lista.length} alunos</div>
      </div>`;
    }).join('')}
  </div>
  <div class="card cp" style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="card-title" style="margin:0">Receita total estimada (ativos)</div>
      <span style="font-family:"Cormorant Garamond",serif;font-size:1.8rem;color:var(--g)">R$ ${total.toLocaleString('pt-BR')}</span>
    </div>
    <div class="alerta alerta-a">⚠️ Valores estimados com base nos planos cadastrados. Parceria, Lesão e Viagem não somam.</div>
  </div>
  ${[5,15,30].map(v=>{
    const lista=vencs[v];
    if(!lista.length)return'';
    return`<div class="card" style="margin-bottom:14px">
      <div class="cp" style="border-bottom:1px solid var(--sand2)">
        <strong>Vencimento dia ${v}</strong> · ${lista.length} alunos · R$ ${calcReceita(lista).toLocaleString('pt-BR')}
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Nome</th><th>Plano</th><th>Valor estimado</th></tr></thead>
        <tbody>${lista.map(a=>{
          const p=normPlano(a.databaseAlunos||a.plano||'');
          const pr=PRECOS[p]||0;
          return`<tr><td>${a.nome}</td><td>${a.databaseAlunos||a.plano||'—'}</td><td>R$ ${pr||'Parceria'}</td></tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`;
  }).join('')}`;
}

function renderPresenca(){
  var q=(document.getElementById('pres-busca')?.value||'').toLowerCase();
  var vencFiltro=document.getElementById('pres-venc')?.value||'';
  var ativos=GA().filter(function(a){
    return a.perfil!=='Gestor'&&a.perfil!=='Operacao'&&a.status==='Ativa'&&aulasPorSemana(a)>0;
  });
  if(q)ativos=ativos.filter(function(a){return a.nome.toLowerCase().includes(q)||a.email.toLowerCase().includes(q);});
  if(vencFiltro)ativos=ativos.filter(function(a){return a.vencMensalidade==vencFiltro;});
  var el=document.getElementById('pres-table');if(!el)return;
  el.innerHTML='<div class="card tbl-wrap"><table><thead><tr><th>Aluno</th><th>Plano</th><th>Venc.</th><th>Aulas/período</th><th>Feitas</th><th>Saldo</th><th>Repos.</th></tr></thead><tbody>'
    +ativos.map(function(a){
      expirarReposicoes(a);
      var aulasDir=calcSaldoPeriodo(a);
      var usadas=checkinsNoPeriodo(a.id,a.vencMensalidade);
      var saldo=Math.max(0,aulasDir-usadas);
      var repos=GR().filter(function(r){return r.userId===a.id&&r.status==='disponivel';}).length;
      var total=saldo+repos;
      var cls=total>0?'color:var(--g)':usadas>aulasDir?'color:var(--red)':'color:var(--amber)';
      return '<tr>'
        +'<td><strong>'+a.nome.split(' ').slice(0,2).join(' ')+'</strong></td>'
        +'<td style="font-size:.78rem">'+( a.databaseAlunos||a.plano||'—')+'</td>'
        +'<td style="font-size:.78rem">Dia '+(a.vencMensalidade||'—')+'</td>'
        +'<td style="text-align:center">'+aulasDir+'</td>'
        +'<td style="text-align:center">'+usadas+'</td>'
        +'<td style="text-align:center;font-weight:600;'+cls+'">'+saldo+'</td>'
        +'<td style="text-align:center">'+(repos>0?'<span class="badge b-ativa">'+repos+'</span>':'—')+'</td>'
        +'</tr>';
    }).join('')
    +'</tbody></table></div>';
}

    +(pendentes.length?'<div class="alerta alerta-a" style="margin-bottom:16px">⚠️ '+pendentes.length+' solicitação(ões) pendente(s)</div>':'')
    +'<div class="card tbl-wrap">'
      +'<table><thead><tr><th>Data</th><th>Aluno</th><th>Tipo</th><th>Motivo/Info</th><th>Status</th><th>Ações</th></tr></thead>'
      +'<tbody>'
      +(sols.length?sols.map(function(s){
        var tipo=s.tipo==='matricula'?'🆕 Nova matrícula':s.tipo==='pausa'?'⏸ Pausa':'❌ Cancelamento';
        var badge=s.tipo==='matricula'?'b-gestor':s.tipo==='pausa'?'b-pausada':'b-cancelamento';
        return '<tr>'
          +'<td style="font-size:.76rem">'+new Date(s.ts).toLocaleDateString('pt-BR')+'</td>'
          +'<td>'+s.nomeAluno+'</td>'
          +'<td><span class="badge '+badge+'">'+tipo+'</span></td>'
          +'<td style="font-size:.78rem">'+( s.motivo||s.planoEscolhido||'—')+'</td>'
          +'<td><span class="badge '+(s.status==='pendente'?'b-ativo':'b-inativo')+'">'+s.status+'</span></td>'
          +'<td style="display:flex;gap:6px">'
          +(s.status==='pendente'?
            '<button class="btn btn-gh btn-sm" onclick="processarSol(\''+s.id+'\',\'aprovado\')">✅ Aprovar</button>'
            +'<button class="btn btn-r btn-sm" onclick="processarSol(\''+s.id+'\',\'recusado\')">✗ Recusar</button>'
            :'—')
          +'</td></tr>';
      }).join(''):'<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--muted)">Nenhuma solicitação</td></tr>')
      +'</tbody></table>'
    +'</div>';

function processarSol(id,decisao){
  var sols=GS();var idx=sols.findIndex(function(s){return s.id===id;});if(idx<0)return;
  var s=sols[idx];
  s.status=decisao;s.processadoEm=new Date().toISOString();s.processadoPor=CU.nome;
  sols[idx]=s;SS(sols);
  if(decisao==='aprovado'){
    var alunos=GA();var ai=alunos.findIndex(function(a){return a.id===s.userId;});
    if(ai>=0){
      if(s.tipo==='matricula'){alunos[ai].status='Ativa';alunos[ai].checkinLiberado=true;}
      else if(s.tipo==='pausa'){alunos[ai].status='Pausada';}
      else if(s.tipo==='cancelamento'){alunos[ai].status='Inativa';}
      else if(s.tipo==='alteracao_vencimento'){
        var novo=s.motivo.replace('Novo vencimento: Dia ','');
        alunos[ai].vencMensalidade=novo;
      }
      else if(s.tipo==='alteracao_plano'){
        var novop=s.motivo.replace('Novo plano: ','');
        alunos[ai].databaseAlunos=novop;
      }
      SA(alunos);
    }
  }
  addLog('sol_'+decisao,{tipo:s.tipo,aluno:s.nomeAluno});
  toast(decisao==='aprovado'?'Aprovado!':'Recusado','s');
  pgSolicitacoes(document.getElementById('main-content'));
}

function pgCheckin(el){
  const h=hoje();
  var avisoInadim=isInadimplente(CU.id)?
    '<div class="alerta alerta-r" style="max-width:600px;margin-bottom:16px">🔒 <strong>Check-in bloqueado</strong> — você possui pagamento em atraso. Regularize para voltar a treinar.</div>':'';
  el.innerHTML=avisoInadim+`
  <div class="pg-title">Check-in</div>
  <div class="pg-sub">Confirme presença em uma turma</div>
  <div class="search-bar">
    <input type="date" id="ci-data" value="${h}" onchange="renderTurmasCI()">
    <button class="btn btn-gh btn-sm" onclick="renderTurmasCI()">↺ Atualizar</button>
    ${isG()?'<span style="font-size:.78rem;color:var(--muted)">Modo gestor — visão completa</span>':''}
  </div>
  <div id="ci-aviso-lock" class="alerta alerta-a hidden">⏰ Check-in bloqueado — encerra às 21h do dia anterior.</div>
  <div id="ci-turmas"></div>`;

function renderTurmasCI(){
  var diaEl=document.getElementById('ci-data');
  if(!diaEl)return;
  var dia=diaEl.value;if(!dia)return;
  var turmas=GT().filter(function(t){return t.dia===dia;}).sort(function(a,b){return a.horario>b.horario?1:-1;});
  var cis=GC();
  var el=document.getElementById('ci-turmas');if(!el)return;
  var lockEl=document.getElementById('ci-aviso-lock');
  if(lockEl)lockEl.classList.add('hidden');

  // Verificar inadimplência
  var inad=isInadimplente(CU.id);
  if(inad&&!isG()){
    el.innerHTML='<div class="alerta alerta-r">🔒 Check-in bloqueado — regularize seu pagamento.</div>';return;
  }

  // Turmas visíveis pela categoria
  var niveis=isG()?null:niveisVisiveis(CU.nivel);

  var turmasFiltradas=turmas.filter(function(t){
    if(isG())return true;
    return !t.nivel||(niveis&&niveis.some(function(n){return t.nivel&&t.nivel.toLowerCase().includes(n.toLowerCase().substring(0,4));}));
  });

  if(!turmasFiltradas.length){
    el.innerHTML='<div class="card cp" style="text-align:center;color:var(--muted)"><p style="font-size:1.5rem;margin-bottom:8px">📅</p><p>Nenhuma turma disponível neste dia.</p>'+(isG()?'<button class="btn btn-gh" style="margin-top:12px" onclick="nav(\'turmas\')">Configurar turmas</button>':'')+' </div>';
    return;
  }

  // Saldo do aluno
  var saldo=isG()?999:saldoDisponivel(CU);
  var meusCIs=cis.filter(function(c){return c.dia===dia&&c.userId===CU.id&&c.status!=='cancelado';});

  var avisoSaldo='';
  if(!isG()&&!isAWA(CU)&&!isPacote(CU)){
    var cor=saldo<=0?'alerta-r':saldo<=2?'alerta-a':'alerta-g';
    avisoSaldo='<div class="alerta '+cor+'" style="margin-bottom:12px">Saldo disponível: <strong>'+saldo+' aula'+(saldo!==1?'s':'')+'</strong></div>';
  }

  var html=avisoSaldo;
  turmasFiltradas.forEach(function(t){
    var ocup=cis.filter(function(c){return c.dia===dia&&c.turmaId===t.id&&c.status!=='cancelado';}).length;
    var livres=Math.max(0,t.vagas-ocup);
    var full=livres===0;
    var jaCi=meusCIs.some(function(c){return c.turmaId===t.id;});
    var cancelada=t.status==='cancelada';

    // Cutoff
    var locked=!isG()&&isLockedV2(dia,t.horario);
    var turnoLabel=isManha(t.horario)?'☀️ Manhã':'🌆 Tarde';
    var cutoffLabel=isManha(t.horario)?'Cutoff: 21h de ontem':'Cutoff: 15h de hoje';

    var blk='';
    if(!isG()){
      if(cancelada)blk='Turma cancelada';
      else if(locked)blk=cutoffLabel+' — encerrado';
      else if(full&&!jaCi)blk='Turma lotada';
      else if(!jaCi&&saldo<=0&&!isAWA(CU))blk='Sem saldo de aulas';
    }

    var pct=Math.min(100,Math.round(ocup/Math.max(t.vagas,1)*100));
    var inscritos=cis.filter(function(c){return c.dia===dia&&c.turmaId===t.id&&c.status!=='cancelado';});
    var inscHtml='';
    if(inscritos.length){
      inscHtml='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">';
      inscritos.forEach(function(c){inscHtml+='<span style="background:rgba(53,92,75,.08);color:var(--g);border-radius:20px;padding:2px 9px;font-size:.72rem">'+c.nomeAluno.split(' ')[0]+'</span>';});
      inscHtml+='</div>';
    }

    var btnHtml='';
    if(isG()){
      btnHtml='<div style="display:flex;gap:6px;flex-wrap:wrap">';
      if(cancelada)btnHtml+='<button class="btn btn-gh btn-sm" onclick="restaurarTurma(\''+t.id+'\')">↩ Restaurar</button>';
      else btnHtml+='<button class="btn btn-a btn-sm" onclick="cancelarTurma(\''+t.id+'\')">Cancelar turma</button>';
      btnHtml+='<button class="btn btn-g btn-sm" onclick="modalCIGestor(\''+t.id+'\',\''+dia+'\',\''+t.horario+'\')">+ Incluir aluno</button>';
      btnHtml+='</div>';
    } else if(jaCi){
      btnHtml='<button class="btn btn-r btn-sm" onclick="cancelarCI(\''+t.id+'\',\''+dia+'\')" '+(locked?' disabled':'')+'>Desfazer</button>';
    } else if(blk){
      btnHtml='<button class="btn btn-gh btn-sm" disabled title="'+blk+'">'+(cancelada?'Cancelada':full?'Lotada':locked?'Encerrado':'Sem saldo')+'</button>';
    } else {
      var tipo=isPacote(CU)?'pacote':isAWA(CU)?'awa':'normal';
      var label=isPacote(CU)?'Check-in ('+( CU.pacoteAulas||0)+' aulas)':'Check-in';
      btnHtml='<button class="btn btn-g btn-sm" onclick="fazerCI(\''+t.id+'\',\''+dia+'\',\''+tipo+'\')">'+label+'</button>';
    }

    var cardClass='turma-card'+(jaCi?' checked':'')+(cancelada?' cancelada':'');
    html+='<div class="'+cardClass+'">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">'
        +'<div>'
          +'<div style="font-size:1.05rem;font-weight:600;color:var(--g)">'+t.horario
            +' <span style="font-size:.72rem;font-weight:400;color:var(--muted)">'+turnoLabel+'</span>'
            +(t.nivel?' <span class="badge b-iniciante" style="font-size:.65rem">'+t.nivel+'</span>':'')
            +(cancelada?' <span class="badge b-inativa">Cancelada</span>':'')
          +'</div>'
          +'<div style="font-size:.75rem;color:var(--muted);margin-top:2px">'+livres+' vaga'+(livres!==1?'s':'')+' de '+t.vagas+' · '+cutoffLabel+'</div>'
        +'</div>'
        +btnHtml
      +'</div>'
      +'<div class="prog"><div class="prog-fill'+(pct>=100?' full':'')+'" style="width:'+pct+'%"></div></div>'
      +'<div style="font-size:.70rem;color:var(--muted)">'+Math.round(pct)+'% ocupado</div>'
      +inscHtml
    +'</div>';
  });

  el.innerHTML=html;
}

    '<div class="fg" style="margin-bottom:14px">'
      +'<label>Buscar aluno por nome, e-mail ou telefone</label>'

    +'</div>'
    +'<div id="ci-resultados" style="max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:6px">'
      +'<p style="font-size:.82rem;color:var(--muted);text-align:center;padding:16px">Digite para buscar</p>'
    +'</div>',
    [{lbl:'Cancelar', cls:'btn-gh', fn:'closeModal()'}]
  );

  window._ciGestor={turmaId:turmaId, dia:dia, horario:horario};
}

function filtrarAlunosCI(){
  var q=(document.getElementById('ci-busca')?.value||'').toLowerCase().trim();
  var el=document.getElementById('ci-resultados');
  if(!el)return;
  if(!q||q.length<2){
    el.innerHTML='<p style="font-size:.82rem;color:var(--muted);text-align:center;padding:16px">Digite ao menos 2 caracteres</p>';
    return;
  }
  var alunos=GA().filter(function(a){
    return a.perfil!=='Gestor'
      && (a.nome.toLowerCase().includes(q)
        || a.email.toLowerCase().includes(q)
        || (a.telefone||'').includes(q)
        || (a.cpf||'').includes(q));
  }).slice(0,10);

  if(!alunos.length){
    el.innerHTML='<p style="font-size:.82rem;color:var(--muted);text-align:center;padding:16px">Nenhum aluno encontrado</p>';
    return;
  }

  el.innerHTML=alunos.map(function(a){

    var plano=a.databaseAlunos||a.plano||'—';
    return '<div style="display:flex;align-items:center;justify-content:space-between;background:var(--sand3);border-radius:9px;padding:10px 13px;gap:10px">'
      +'<div>'
        +'<div style="font-size:.86rem;font-weight:500">'+a.nome+'</div>'
        +'<div style="font-size:.74rem;color:var(--muted);margin-top:1px">'+a.email+' · '+plano+'</div>'
        +(inadim?'<span class="badge b-inativa" style="font-size:.68rem;margin-top:3px">Inadimplente</span>':'')
      +'</div>'
      +'<button class="btn btn-g btn-sm" onclick="confirmarCIGestor(\''+a.id+'\')">Incluir</button>'

  }).join('');
}

function confirmarCIGestor(alunoId){
  var ctx=window._ciGestor;
  if(!ctx){closeModal();return;}
  var aluno=GA().find(function(a){return a.id===alunoId;});
  if(!aluno){toast('Aluno não encontrado','e');return;}

  var cis=GC();
  var t=GT().find(function(x){return x.id===ctx.turmaId;});
  var ocup=cis.filter(function(c){return c.dia===ctx.dia&&c.turmaId===ctx.turmaId&&c.status!=='cancelado';}).length;

  if(ocup>=(t?.vagas||0)){toast('Turma lotada','e');return;}

  // Verificar se já está na turma
  if(cis.some(function(c){return c.dia===ctx.dia&&c.turmaId===ctx.turmaId&&c.userId===alunoId&&c.status!=='cancelado';})){
    toast(aluno.nome.split(' ')[0]+' já está nesta turma','e');return;
  }

  cis.push({
    id:'ci'+Date.now(),
    dia:ctx.dia,
    turmaId:ctx.turmaId,
    userId:alunoId,
    nomeAluno:aluno.nome,
    plano:aluno.databaseAlunos||aluno.plano||'',
    horario:ctx.horario,
    tipo:'gestor',
    status:'ativo',
    ts:new Date().toISOString()
  });
  SC(cis);
  addLog('ci_gestor',{aluno:aluno.nome,dia:ctx.dia,horario:ctx.horario});
  closeModal();
  toast(aluno.nome.split(' ')[0]+' incluído no check-in!','s');
  renderTurmasCI();
}

function fazerCI(turmaId,dia,tipo){
  if(isInadimplente(CU.id)&&!isG()){toast('Check-in bloqueado — regularize o pagamento','e');return;}
  var cis=GC();
  var meus=cis.filter(function(c){return c.dia===dia&&c.userId===CU.id&&c.status!=='cancelado';});
  if(meus.some(function(c){return c.turmaId===turmaId;})){toast('Já inscrito nesta turma','e');return;}
  var t=GT().find(function(x){return x.id===turmaId;});
  if(!t){toast('Turma não encontrada','e');return;}
  var ocup=cis.filter(function(c){return c.dia===dia&&c.turmaId===turmaId&&c.status!=='cancelado';}).length;
  if(ocup>=(t.vagas||0)){toast('Turma lotada','e');return;}
  if(isLockedV2(dia,t.horario)&&!isG()){toast('Prazo de check-in encerrado','e');return;}

  // Verificar saldo
  if(!isG()&&!isAWA(CU)){
    var saldo=saldoDisponivel(CU);
    if(saldo<=0){toast('Sem saldo de aulas disponível','e');return;}
  }

  // Descontar saldo
  if(tipo==='pacote'&&!isG()){
    var alunos=GA();var ai=alunos.findIndex(function(a){return a.id===CU.id;});
    if(ai>=0){alunos[ai].pacoteAulas=Math.max(0,(alunos[ai].pacoteAulas||0)-1);if(!alunos[ai].pacoteExpira)alunos[ai].pacoteExpira=setPacoteExpira();CU.pacoteAulas=alunos[ai].pacoteAulas;CU.pacoteExpira=alunos[ai].pacoteExpira;SA(alunos);}
  }
  // Repos: usar a mais antiga primeiro
  if(!isG()&&tipo==='normal'&&!isAWA(CU)){
    var repos=GR();
    var dispRep=repos.filter(function(r){return r.userId===CU.id&&r.status==='disponivel';}).sort(function(a,b){return a.geradoEm>b.geradoEm?1:-1;});
    // Verificar saldo do período atual primeiro
    var aulasDir=calcSaldoPeriodo(CU);
    var usadas=checkinsNoPeriodo(CU.id,CU.vencMensalidade);
    // Se período atual tem saldo, usa ele. Senão usa repos da mais antiga.
    if(aulasDir<=usadas&&dispRep.length>0){
      var ri=repos.findIndex(function(r){return r.id===dispRep[0].id;});
      if(ri>=0){repos[ri].status='usada';repos[ri].usadaEm=dia;SR(repos);}
    }
  }

  cis.push({id:'ci'+Date.now(),dia,turmaId,userId:CU.id,nomeAluno:CU.nome,plano:CU.databaseAlunos||CU.plano||'',horario:t.horario,nivel:t.nivel||CU.nivel,tipo,status:'ativo',ts:new Date().toISOString()});
  SC(cis);
  addLog('checkin',{dia,horario:t.horario,tipo});
  toast('✅ Check-in feito!','s');
  renderTurmasCI();
}
function cancelarCI(turmaId,dia){
  const cis=GC();
  const idx=[...cis].reverse().findIndex(c=>c.dia===dia&&c.turmaId===turmaId&&c.userId===CU.id&&c.status!=='cancelado');
  const realIdx=idx>=0?cis.length-1-idx:-1;
  if(realIdx<0){toast('Não encontrado','e');return;}
  const ci=cis[realIdx];
  if(ci.tipo==='pacote'){
    const alunos=GA();const ai=alunos.findIndex(a=>a.id===CU.id);
    if(ai>=0){alunos[ai].pacoteAulas++;CU.pacoteAulas++;SA(alunos);}
  }
  if(ci.tipo==='repos'){
    const repos=GR();const ri=repos.findIndex(r=>r.userId===CU.id&&r.status==='usada'&&r.usadaEm===dia);
    if(ri>=0){repos[ri].status='disponivel';delete repos[ri].usadaEm;SR(repos);}
  }
  cis[realIdx].status='cancelado';SC(cis);
  addLog('cancel_ci',{dia,horario:cis[realIdx].horario});
  toast('Check-in desfeito','s');renderTurmasCI();
}

function saveNovaTurma(){
  var d=document.getElementById('nt-d').value;
  var h=document.getElementById('nt-h').value.trim();

  ST(turmas);closeModal();toast('Turma criada!','s');
  pgTurmas(document.getElementById('main-content'));

function atualizarVagas(id,v){
  const turmas=GT();const t=turmas.find(x=>x.id===id);
  if(t){t.vagas=parseInt(v)||0;ST(turmas);}toast('Vagas salvas','s');
}
function cancelarTurma(id){
  if(!confirm('Cancelar esta turma? Os check-ins serão desfeitos e créditos de reposição gerados automaticamente.'))return;
  const turmas=GT();const t=turmas.find(x=>x.id===id);
  if(!t)return;
  t.status='cancelada';ST(turmas);
  // Desfazer check-ins e gerar créditos
  const cis=GC();
  const alunos=GA();
  const repos=GR();
  let creditos=0;
  cis.forEach((c,i)=>{
    if(c.dia===t.dia&&c.turmaId===id&&c.status!=='cancelado'){
      cis[i].status='cancelado';cis[i].motivoCancelamento='turma_cancelada';
      // Devolver pacote
      if(c.tipo==='pacote'){
        const ai=alunos.findIndex(a=>a.id===c.userId);
        if(ai>=0)alunos[ai].pacoteAulas++;
      }
      // Gerar crédito de reposição para todos
      repos.push({id:'r'+Date.now()+Math.random(),userId:c.userId,nomeAluno:c.nomeAluno,origem:'turma_cancelada',turmaId:id,dia:t.dia,horario:t.horario,status:'disponivel',geradoEm:new Date().toISOString()});
      creditos++;
    }
  });
  SC(cis);SA(alunos);SR(repos);
  addLog('cancelar_turma',{turmaId:id,dia:t.dia,horario:t.horario,creditos});
  toast(`Turma cancelada · ${creditos} créditos de reposição gerados`,'s');
  pgTurmas(document.getElementById('main-content'));
}
function restaurarTurma(id){
  const turmas=GT();const t=turmas.find(x=>x.id===id);
  if(t){t.status='ativa';ST(turmas);}
  toast('Turma restaurada','s');pgTurmas(document.getElementById('main-content'));
}
function excluirTurma(id){
  if(!confirm('Excluir turma permanentemente?'))return;
  ST(GT().filter(t=>t.id!==id));
  toast('Excluída');pgTurmas(document.getElementById('main-content'));
}
function criarLote(){
  const ini=new Date(document.getElementById('lt-ini').value+'T12:00:00');
  const fim=new Date(document.getElementById('lt-fim').value+'T12:00:00');
  const dias=[...document.querySelectorAll('.lt-dia:checked')].map(c=>c.value);
  const hors=document.getElementById('lt-h').value.trim().split('\n').map(h=>h.trim()).filter(Boolean);
  const vagas=parseInt(document.getElementById('lt-v').value)||16;
  if(isNaN(ini.getTime())||isNaN(fim.getTime())){toast('Datas inválidas','e');return;}
  if(!dias.length){toast('Selecione os dias','e');return;}
  if(!hors.length){toast('Informe os horários','e');return;}
  const mapD={Segunda:1,Terça:2,Quarta:3,Quinta:4,Sexta:5,Sábado:6};
  const turmas=GT();let n=0;
  const cur=new Date(ini);
  while(cur<=fim){
    const dow=cur.getDay();
    const ds=Object.keys(mapD).find(k=>mapD[k]===dow);
    if(ds&&dias.includes(ds)){
      const dStr=cur.toISOString().split('T')[0];
      hors.forEach(h=>{
        turmas.push({id:'t'+Date.now()+Math.random(),dia:dStr,horario:h,vagas,label:'',status:'ativa',criadoPor:CU.nome});
        n++;
      });
    }
    cur.setDate(cur.getDate()+1);
  }
  ST(turmas);toast(`${n} turmas criadas!`,'s');pgTurmas(document.getElementById('main-content'));
}

  [{lbl:'Cancelar',cls:'btn-gh',fn:'closeModal()'},{lbl:'Confirmar',cls:'btn-g',fn:`confirmarReposicao('${repoId}')`}]);

function confirmarReposicao(repoId){
  const turmaId=document.getElementById('repo-turma').value;
  const repos=GR();const ri=repos.findIndex(r=>r.id===repoId);if(ri<0)return;
  const r=repos[ri];
  const t=GT().find(x=>x.id===turmaId);
  const aluno=GA().find(a=>a.id===r.userId);
  if(!aluno||!t){toast('Erro','e');return;}
  // Criar check-in de reposição
  const cis=GC();
  cis.push({id:'ci'+Date.now(),dia:t.dia,turmaId,userId:aluno.id,nomeAluno:aluno.nome,plano:aluno.databaseAlunos||aluno.plano||'',horario:t.horario,tipo:'reposicao',status:'ativo',ts:new Date().toISOString()});
  SC(cis);
  repos[ri].status='usada';repos[ri].usadaEm=t.dia;SR(repos);
  addLog('reposicao_incluida',{aluno:aluno.nome,turma:t.dia+' '+t.horario});
  closeModal();toast(`${aluno.nome.split(' ')[0]} incluído em ${fmtData(t.dia)} · ${t.horario}`,'s');

}

function renderLista(){

    var nivelTurma=turma&&turma.nivel?turma.nivel:'';

    grupo=grupo.sort(function(a,b){
      var alA=GA().find(function(x){return x.id===a.userId;});
      var alB=GA().find(function(x){return x.id===b.userId;});
      var nA=ordemNivel[alA?.nivel||'']||9;
      var nB=ordemNivel[alB?.nivel||'']||9;
      var sA=parseInt(alA?.subcategoria||'9')||9;
      var sB=parseInt(alB?.subcategoria||'9')||9;
      return nA!==nB?nA-nB:sA!==sB?sA-sB:a.nomeAluno>b.nomeAluno?1:-1;
    });
    var pct=vagas?Math.min(100,Math.round(grupo.length/vagas*100)):0;
    html+='<div class="card" style="margin-bottom:14px">'
      +'<div style="padding:12px 18px;border-bottom:1px solid var(--sand2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">'

          +(nivelTurma?'<span class="badge b-iniciante" style="font-size:.65rem">'+nivelTurma+'</span>':'')
          +'<span class="badge '+(grupo.length>=(vagas||999)?'b-inativa':'b-ativa')+'">'+grupo.length+(vagas?' / '+vagas:'')+'</span>'
        +'</div>'
        +(vagas?'<div class="prog" style="width:140px;margin:0"><div class="prog-fill'+(pct>=100?' full':'')+'" style="width:'+pct+'%"></div></div>':'')
      +'</div>'
      +'<div style="padding:4px 0">'
      +grupo.map(function(c,i){
        var aluno=GA().find(function(a){return a.id===c.userId;});
        var nivel=aluno?.nivel||'—';
        var subcat=aluno?.subcategoria||'';
        var nivelCls=nivel.toLowerCase().includes('avan')?'b-avancado':nivel.toLowerCase().includes('interm')?'b-intermediario':'b-iniciante';
        return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 18px;border-bottom:1px solid rgba(0,0,0,.03)">'

              +'<span style="font-size:.86rem;font-weight:500">'+c.nomeAluno+'</span>'
              +(aluno?.telefone?' <span style="font-size:.72rem;color:var(--muted)">'+aluno.telefone+'</span>':'')

function processarInadimplentes(){
  var raw=document.getElementById('inadim-input').value.trim();
  if(!raw){ toast('Cole ao menos um e-mail ou CPF','e'); return; }
  var chaves=raw.split('\n').map(function(s){ return s.trim().toLowerCase(); }).filter(Boolean);
  var alunos=GA();
  var bloqueados=getInadimplentes();
  var adicionados=0;
  chaves.forEach(function(chave){
    var aluno=alunos.find(function(a){
      return a.email.toLowerCase()===chave || a.cpf===chave.replace(/\D/g,'');
    });
    if(!aluno){ return; }
    if(bloqueados.find(function(b){ return b.id===aluno.id; })){ return; }
    bloqueados.push({
      id:aluno.id, nome:aluno.nome, email:aluno.email, cpf:aluno.cpf,
      bloqueadoEm:new Date().toISOString()
    });
    adicionados++;
  });
  setInadimplentes(bloqueados);
  addLog('bloquear_inadimplencia',{qtd:adicionados});
  toast(adicionados+' aluno(s) bloqueado(s)','s');
  document.getElementById('inadim-input').value='';
  pgInadimplencia(document.getElementById('main-content'));
}

function desbloquear(id){
  var lista=getInadimplentes().filter(function(x){ return x.id!==id; });

  addLog('desbloquear_inadimplencia',{id:id});
  toast('Aluno desbloqueado','s');
  pgInadimplencia(document.getElementById('main-content'));
}

/* == HELPERS V2 == */
function senhaDefault(a){var c=(a.cpf||'').replace(/\D/g,'');return c||'123456';}
function aulasPorSemana(a){var p=(a.databaseAlunos||a.plano||'').toLowerCase().trim();var m=p.match(/^(\d+)x/);return m?parseInt(m[1]):0;}
function isPacote(a){return /pacote/i.test(a.databaseAlunos||a.plano||'');}
function isAWA(a){return /^awa$/i.test((a.databaseAlunos||a.plano||'').trim());}
function niveisVisiveis(nivel){
  var n=(nivel||'').toLowerCase();
  if(n.includes('avan')) return ['Avancado','Avançado','Intermediario','Intermediário','Iniciante'];
  if(n.includes('interm')) return ['Intermediario','Intermediário','Iniciante'];
  return ['Iniciante'];
}
function isManha(horario){var h=parseInt((horario||'0').split(':')[0]);return h>=6&&h<12;}
function getCutoff(dia,horario){
  var parts=dia.split('-').map(Number);
  var d=new Date(parts[0],parts[1]-1,parts[2]);
  if(isManha(horario)){d.setDate(d.getDate()-1);d.setHours(21,0,0,0);}
  else{d.setHours(15,0,0,0);}
  return d;
}
function isLockedV2(dia,horario){return new Date()>getCutoff(dia,horario);}
function getPeriodo(vencNum){
  var hoje=new Date();var ano=hoje.getFullYear();var mes=hoje.getMonth();
  var ini=new Date(ano,mes,vencNum);
  if(hoje<ini)ini=new Date(ano,mes-1,vencNum);
  var fim=new Date(ini.getFullYear(),ini.getMonth()+1,vencNum);
  return{ini:ini,fim:fim,iniStr:ini.toISOString().split('T')[0],fimStr:fim.toISOString().split('T')[0]};
}
function calcSaldoPeriodo(aluno){
  var v=parseInt(aluno.vencMensalidade)||5;
  var aps=aulasPorSemana(aluno);if(!aps)return 0;
  var p=getPeriodo(v);
  var dias=(p.fim-p.ini)/(864e5);
  return Math.round(dias/7*aps);
}
function checkinsNoPeriodo(alunoId,venc){
  var v=parseInt(venc)||5;
  var p=getPeriodo(v);
  return GC().filter(function(c){return c.userId===alunoId&&c.status!=='cancelado'&&c.dia>=p.iniStr;}).length;
}
function saldoDisponivel(aluno){
  if(isPacote(aluno)){
    if(pacoteExpirado(aluno))return 0;
    return aluno.pacoteAulas||0;
  }
  if(isAWA(aluno))return 999;
  var aulasDir=calcSaldoPeriodo(aluno);
  var usadas=checkinsNoPeriodo(aluno.id,aluno.vencMensalidade);
  var saldoPer=Math.max(0,aulasDir-usadas);
  expirarReposicoes(aluno);
  var repos=GR().filter(function(r){return r.userId===aluno.id&&r.status==='disponivel';}).length;
  return saldoPer+repos;
}
function expirarReposicoes(aluno){
  var v=parseInt(aluno.vencMensalidade)||5;
  var hoje=new Date();var repos=GR();var mudou=false;
  repos.forEach(function(r,i){
    if(r.userId!==aluno.id||r.status!=='disponivel'||!r.geradoEm) return;
    var gerado=new Date(r.geradoEm);
    var vencSubs=new Date(gerado.getFullYear(),gerado.getMonth()+1,v);
    var expira=new Date(vencSubs.getTime()+14*864e5);
    if(hoje>expira){repos[i].status='expirada';mudou=true;}
  });
  if(mudou)SR(repos);
}
function pacoteExpirado(aluno){
  if(!aluno.pacoteExpira)return false;
  return new Date()>new Date(aluno.pacoteExpira);
}
function nivelLabel(turma){
  return turma.nivel||'';
}

/* == DIAS POR PLANO == */
var DIAS_SEMANA = ['Segunda','Terca','Quarta','Quinta','Sexta'];
var DIAS_AWA    = ['Segunda','Terca','Quarta','Quinta','Sexta','Sabado'];

function diasPermitidos(plano){
  var p = (plano||'').toLowerCase();
  if(/^awa$/i.test(p.trim())) return DIAS_AWA;
  return DIAS_SEMANA;
}

function maxDiasSemana(plano){
  var p = (plano||'').toLowerCase().trim();
  var m = p.match(/^(\d+)x/);
  if(m) return parseInt(m[1]);
  if(/^awa$/i.test(p)) return 6;
  return 0; // pacote/avulso = sem trava
}

function isPlanoDias(aluno){
  // Retorna true se o aluno precisa escolher dias fixos
  var p = normPlano(aluno.databaseAlunos||aluno.plano||'');
  return /^\d+x$/.test(p) || /^awa$/.test(p);
}


function renderMeusDias(el, u){
  var plano = u.databaseAlunos||u.plano||'';
  var normP = normPlano(plano);
  var temDias = isPlanoDias(u);
  var maxD = maxDiasSemana(plano);
  var diasDisp = diasPermitidos(plano);
  var selDias = (u.diasSemana||'').split(',').map(function(d){return d.trim();}).filter(Boolean);
  var selHors = (u.horarios||'').split(',').map(function(h){return h.trim();}).filter(Boolean);

  // Pacote / Avulso: não precisa escolher dias
  if(!temDias){
    el.innerHTML='<div class="alerta alerta-b">Seu plano (<strong>'+plano+'</strong>) não requer agendamento de dias fixos.<br>Você pode fazer check-in em qualquer turma disponível da sua categoria, respeitando seu saldo.</div>';
    return;
  }

  // Horários disponíveis (da config do sistema)
  var configHor = DB.get('turmashor_config',{});
  var nivelKey = (u.nivel||'Iniciante').toLowerCase().includes('avan')?'Avancado':(u.nivel||'').toLowerCase().includes('interm')?'Intermediario':'Iniciante';
  var horsPorDia = configHor[nivelKey]||{};

  var html='<div class="alerta alerta-b" style="margin-bottom:14px">Plano <strong>'+plano+'</strong> · Selecione até <strong>'+maxD+' dia'+(maxD!==1?'s':'')+'</strong> por semana</div>';
  html+='<div style="display:flex;flex-direction:column;gap:10px" id="meusdias-wrap">';

  diasDisp.forEach(function(dia){
    var diaChecked = selDias.indexOf(dia)>=0;
    var hors = horsPorDia[dia]||[];
    html+='<div style="background:var(--sand3);border-radius:9px;padding:10px 13px">';
    html+='<label style="display:flex;align-items:center;gap:8px;font-size:.86rem;font-weight:500;cursor:pointer">';
    html+='<input type="checkbox" class="meusdias-dia" value="'+dia+'" '+(diaChecked?'checked':'')+' onchange="onToggleDiaMeusDias(this,'+maxD+')" style="width:16px;height:16px;accent-color:var(--g)"> '+dia;
    html+='</label>';
    if(hors.length){
      html+='<div id="meusdias-hors-'+dia+'" style="display:'+(diaChecked?'flex':'none')+';flex-wrap:wrap;gap:6px;margin-top:8px">';
      hors.forEach(function(h){
        var checked = selHors.indexOf(h)>=0;
        html+='<label style="display:flex;align-items:center;gap:5px;font-size:.78rem;background:#fff;border:1.5px solid '+(checked?'var(--g)':'var(--sand2)')+';border-radius:20px;padding:4px 11px;cursor:pointer">';
        html+='<input type="checkbox" class="meusdias-hor" value="'+h+'" '+(checked?'checked':'')+' onchange="onToggleHorMeusDias(this)" style="display:none"> '+h;
        html+='</label>';
      });
      html+='</div>';
    }
    html+='</div>';
  });

  html+='</div>';
  html+='<button class="btn btn-g btn-sm" style="margin-top:14px" onclick="salvarMeusDias()">Salvar meus dias</button>';
  el.innerHTML = html;
}

function onToggleDiaMeusDias(cb, maxD){
  var allChecked = document.querySelectorAll('.meusdias-dia:checked');
  if(cb.checked && allChecked.length > maxD){
    cb.checked = false;
    toast('Seu plano permite no máximo '+maxD+' dia'+(maxD!==1?'s':'')+' por semana','e');
    return;
  }
  var hors = document.getElementById('meusdias-hors-'+cb.value);
  if(hors) hors.style.display = cb.checked ? 'flex' : 'none';
  if(!cb.checked){
    // Desmarcar todos os horários desse dia
    var wrap = hors;
    if(wrap) wrap.querySelectorAll('.meusdias-hor').forEach(function(h){
      h.checked=false;
      h.parentElement.style.borderColor='var(--sand2)';
    });
  }
}

function onToggleHorMeusDias(cb){
  cb.parentElement.style.borderColor = cb.checked ? 'var(--g)' : 'var(--sand2)';
}

function salvarMeusDias(){
  var dias=[...document.querySelectorAll('.meusdias-dia:checked')].map(function(c){return c.value;}).join(', ');
  var hors=[...document.querySelectorAll('.meusdias-hor:checked')].map(function(c){return c.value;}).join(', ');
  var alunos=GA();var idx=alunos.findIndex(function(a){return a.id===CU.id;});if(idx<0)return;
  alunos[idx].diasSemana=dias;
  alunos[idx].horarios=hors;
  CU=alunos[idx];SA(alunos);
  addLog('edit_dias',{dias:dias,hors:hors});
  toast('Dias e horários salvos!','s');
}

      +'<div class="fg" style="margin-bottom:12px"><label>Novo plano</label>'

        +'</select>'

  // Histórico de solicitações
  if(sols.length){

        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 18px;border-bottom:1px solid var(--sand2);font-size:.82rem">'

function solicitarAlteracaoVencimento(){
  var v = document.getElementById('sol-venc').value;

  sols.push({id:'s'+Date.now(),userId:CU.id,nomeAluno:CU.nome,tipo:'alteracao_vencimento',motivo:'Novo vencimento: Dia '+v,status:'pendente',ts:new Date().toISOString()});
  SS(sols);addLog('sol_alt_vencimento',{novo:v});
  toast('Solicitação enviada! Vale na próxima competência.','s');
  tabPerfil('solicitacoes',null);
}

function solicitarAlteracaoPlano(){
  var p = document.getElementById('sol-plano').value;
